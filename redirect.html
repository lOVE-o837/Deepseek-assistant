<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>感谢反馈 · DeepSeek 助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1b3e, #1a1040);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; color: #f0eaff; padding: 20px;
    }
    .card {
      text-align: center; padding: 40px 32px; border-radius: 20px;
      background: rgba(13,27,62,0.7); backdrop-filter: blur(20px);
      border: 1px solid rgba(180,140,255,0.3);
      box-shadow: 0 12px 48px rgba(0,0,0,0.4); max-width: 460px; width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 10px; font-weight: 700; }
    .subtitle { color: #c8bef0; line-height: 1.7; margin-bottom: 20px; font-size: 14px; }
    .steps-box {
      text-align: left; margin: 20px 0; padding: 20px 24px;
      background: rgba(124,58,237,0.1); border-radius: 12px;
      border: 1px solid rgba(180,140,255,0.2);
    }
    .steps-box ol { padding-left: 20px; }
    .steps-box li { margin-bottom: 10px; color: #d4b8ff; font-size: 14px; line-height: 1.6; }
    .steps-box li strong { color: #f0eaff; }
    .hint {
      display: inline-block; margin-top: 8px; padding: 8px 20px;
      border-radius: 20px; background: rgba(124,58,237,0.25);
      border: 1px solid rgba(180,140,255,0.4);
      font-size: 13px; color: #d4b8ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>感谢你的反馈！</h1>
    <p class="subtitle">专属奖励已准备就绪。</p>
    <div class="steps-box">
      <ol>
        <li>切回 <strong>DeepSeek</strong> 页面</li>
        <li>按 <strong>Alt+K</strong> 打开助手面板</li>
        <li>切换到「<strong>设置</strong>」标签页</li>
        <li>点击底部的「<strong>✨ 兑换奖励</strong>」按钮</li>
      </ol>
    </div>
    <span class="hint">🌊 你的专属隐藏主题正在等你</span>
  </div>
</body>
</html>
